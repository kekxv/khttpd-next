name: Bazel Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Bazel(NO WINDOWS)
        uses: bazel-contrib/setup-bazel@0.15.0
        if: ${{matrix.os != 'windows-latest'}}
        with:
          bazelisk-version: 1.x
          # Avoid downloading Bazel every time.
          bazelisk-cache: true
          # Store build cache per workflow.
          disk-cache: ${{ github.workflow }}
          # Share repository cache between workflows.
          repository-cache: true
          bazelrc: |
            build --cxxopt='-std=c++17'
            #build --@boost.mysql//:ssl=boringssl
            build --@boost.asio//:ssl=boringssl
      - name: Install Bazel(WINDOWS)
        if: ${{matrix.os == 'windows-latest'}}
        uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-version: 1.x
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
          bazelrc: |
            build --cxxopt='/std:c++17'
            build --cxxopt='/utf-8'
            build --cxxopt='/wd4514'
            build --cxxopt='/wd4625'
            build --cxxopt='/wd4582'
            build --cxxopt='/wd4365'
            build --cxxopt='/wd5045'
            build --cxxopt='/wd4820'
            build --cxxopt='/wd5031'
            build --cxxopt='/wd4668'
            build --cxxopt='/wd5027'
            build --cxxopt='/wd5204'
            build --cxxopt='/wd5206'
            build --cxxopt='/wd4626'
            build --cxxopt='/wd4623'
            build --cxxopt='/wd4710'
            #build --@boost.mysql//:ssl=boringssl
            build --@boost.asio//:ssl=boringssl

      - name: Bazel Test
        run: |
          bazel test framework/... \
            --test_output=errors \
            --test_verbose_timeout_warnings \
            --verbose_failures
  example:
    needs: build
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    name: Build example
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Bazel(NO WINDOWS)
        uses: bazel-contrib/setup-bazel@0.15.0
        if: ${{matrix.os != 'windows-latest'}}
        with:
          bazelisk-version: 1.x
          disk-cache: ${{ github.workflow }}
          bazelisk-cache: true
          repository-cache: true
          bazelrc: |
            build --cxxopt='-std=c++17'
            #build --@boost.mysql//:ssl=boringssl
            build --@boost.asio//:ssl=boringssl
      - name: Install Bazel(WINDOWS)
        if: ${{matrix.os == 'windows-latest'}}
        uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-version: 1.x
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
          bazelrc: |
            build --cxxopt='/std:c++17'
            build --cxxopt='/utf-8'
            build --features=static_link_msvcrt
            #build --@boost.mysql//:ssl=boringssl
            build --@boost.asio//:ssl=boringssl
      - name: Bazel Build example
        run: |
          cp .bazelrc ./example
          cd example
          bazel build app
          cd ..

  release:
    needs: [build, example]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from MODULE.bazel
        id: version
        run: |
          VERSION=$(grep -oP 'version\s*=\s*"\K[^"]+' MODULE.bazel | head -1)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Found version: ${VERSION}"

      - name: Check if tag exists
        id: check_tag
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists, skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} does not exist, will create release."
          fi

      - name: Create tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: false
